services:
  - type: web
    name: greenlens-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: singapore
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: BAAI/bge-m3
      - key: CHROMA_PATH
        value: /data/chroma_db
      - key: DOCS_PATH
        value: /data/documents
      - key: LLM_MODEL
        value: meta-llama/llama-3.1-8b-instruct:free
      - key: ALLOWED_ORIGINS
        value: https://greenlens.onrender.com
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
    disk:
      name: greenlens-data
      mountPath: /data
      sizeGB: 10
    buildFilter:
      paths:
        - backend/**
    healthCheckPath: /health

  - type: web
    name: greenlens
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: true
    buildFilter:
      paths:
        - frontend/**
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://greenlens-api.onrender.com
