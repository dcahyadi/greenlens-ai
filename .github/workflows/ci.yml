name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install PyTorch CPU (must be installed first on 3.13)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install dev tools
        run: pip install ruff pytest pytest-asyncio httpx

      - name: Lint
        run: ruff check app/ ingestion/ tests/ || true

      - name: Test
        env:
          ENVIRONMENT: test
          CHROMA_PATH: /tmp/test_chroma
          DOCS_PATH: /tmp/test_docs
          OPENROUTER_API_KEY: test-key
        run: pytest tests/ -v --tb=short

  frontend:
    name: Frontend — Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          VITE_API_URL: https://greenlens-api.onrender.com
        run: npm run build
